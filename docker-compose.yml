version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: cart-postgres
    environment:
      POSTGRES_DB: cartdb
      POSTGRES_USER: cartuser
      POSTGRES_PASSWORD: cartpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cartuser -d cartdb" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cart-network

  cart-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cart-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cartdb
      SPRING_DATASOURCE_USERNAME: cartuser
      SPRING_DATASOURCE_PASSWORD: cartpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_FLYWAY_ENABLED: true
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cart-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  cart-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

